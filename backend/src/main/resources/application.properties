spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.config.use-legacy-processing=true

# DB서버 타입(hsql,mysql) - datasource 및 sqlMap 파일 지정에 사용됨
Globals.DbType=hsql

# HSQL
Globals.hsql.DriverClassName=org.hsqldb.jdbcDriver
Globals.hsql.Url=jdbc:hsqldb:mem:sampledb
Globals.hsql.UserName=sa
Globals.hsql.Password=

server.servlet.context-path=/
server.port=8080
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# UTF-8 enforcement (Windows cp949 default defense)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8
spring.messages.encoding=UTF-8

# Logging
logging.root.level=INFO

# Swagger/OpenAPI
springdoc.version=v4.2.0
springdoc.packages-to-scan=egovframework
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.groups.enabled=true
springdoc.cache.disabled=true

# AI Engine
risk.ai-engine.url=http://127.0.0.1:8000
